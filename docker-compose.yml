services:
  postgres:
    image: postgres:16-alpine
    container_name: bookverse
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookverse}
      POSTGRES_USER: ${POSTGRES_USER:-bookverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookverse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookverse} -d ${POSTGRES_DB:-bookverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bookverse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

