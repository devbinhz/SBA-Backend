server {
    listen 80;
    server_name 104-64-205-45.ip.linodeusercontent.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 104-64-205-45.ip.linodeusercontent.com;

    # SSL Certificates (mounted from host)
    ssl_certificate /etc/letsencrypt/live/104-64-205-45.ip.linodeusercontent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/104-64-205-45.ip.linodeusercontent.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/v1/ {
        # backend is the name of the service in docker-compose.yml
        proxy_pass http://backend:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /minio/ {
        # minio is the name of the service in docker-compose.services.yml
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
    }
}
