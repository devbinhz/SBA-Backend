spring:
  application:
    name: bookverse-backend
  profiles:
    active: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookverse}
    username: ${SPRING_DATASOURCE_USERNAME:bookverse}
    password: ${SPRING_DATASOURCE_PASSWORD:bookverse}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations:
        - classpath:db/seed/01_users.sql
        - classpath:db/seed/02_books.sql
        - classpath:db/seed/03_orders.sql
        - classpath:db/seed/04_reviews.sql
        - classpath:db/seed/05_vouchers.sql
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

bookverse:
  admin:
    email: ${BOOKVERSE_ADMIN_EMAIL:admin@bookverse.local}
    password: ${BOOKVERSE_ADMIN_PASSWORD:ChangeMe123!}
    full-name: ${BOOKVERSE_ADMIN_FULL_NAME:BookVerse Admin}
  security:
    jwt-secret: ${JWT_SECRET:change-me-at-least-32-bytes-change-me}
    jwt:
      access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token:
      expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:2592000000}
      bytes: ${REFRESH_TOKEN_BYTES:32}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  otp:
    expiration-ms: ${OTP_EXPIRATION_MS:600000}
  mail:
    from-email: ${SMTP_FROM_EMAIL:${SMTP_USERNAME:}}
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/result}
    cancel-url: ${VNPAY_CANCEL_URL:http://localhost:5173/payment/cancel}
  order:
    shipping-fee-vnd: ${SHIPPING_FEE_VND:30000}
    expiration-minutes: ${ORDER_EXPIRATION_MINUTES:15}
  scheduler:
    expired-orders:
      fixed-delay-ms: ${EXPIRED_ORDER_SCHEDULER_FIXED_DELAY_MS:60000}
      batch-size: ${EXPIRED_ORDER_SCHEDULER_BATCH_SIZE:50}
  rag:
    base-url: ${RAG_BASE_URL:http://localhost:8000}
    timeout-ms: ${RAG_TIMEOUT_MS:300000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    books-bucket: ${MINIO_BOOKS_BUCKET:bookverse-books}
    thumbnails-bucket: ${MINIO_THUMBNAILS_BUCKET:bookverse-thumbnails}
